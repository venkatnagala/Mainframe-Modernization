name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: agent-gateway
            context: ./agent_gateway
          - name: ai-mcp
            context: ./ai_mcp
          - name: cobol-mcp
            context: ./cobol_mcp
          - name: rust-mcp
            context: ./rust_mcp
          - name: s3-mcp
            context: ./s3_mcp
          - name: green-agent
            context: ./green_agent
          - name: purple-agent
            context: ./purple_agent

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/mainframe-${{ matrix.service.name }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/mainframe-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
