---
# Green Agent - Orchestrator
# All MCP calls go THROUGH the Agent Gateway (never directly)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: green-agent
  namespace: mainframe-modernization
  labels:
    app: green-agent
    component: orchestrator
    version: "1.0.0"
spec:
  replicas: 1  # Single orchestrator (stateful workflow)
  selector:
    matchLabels:
      app: green-agent
  template:
    metadata:
      labels:
        app: green-agent
        component: orchestrator
    spec:
      serviceAccountName: green-agent-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
        # Wait for Agent Gateway to be ready before starting
        - name: wait-for-gateway
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -qO- http://agent-gateway:8090/health; do echo "Waiting for agent-gateway..."; sleep 3; done']
      containers:
        - name: green-agent
          image: venkatnagala/green-agent:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: log-level
            # Gateway URL - all MCP calls routed through here
            - name: AGENT_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: gateway-url
            # Own credentials to authenticate with gateway
            - name: AGENT_ID
              value: "green_agent"
            - name: AGENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: green-agent-credentials
                  key: api-key
            # AWS config (IRSA preferred, fallback to secret)
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: aws-region
            - name: S3_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: s3-bucket
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp-workspace
              mountPath: /tmp/workspace
      volumes:
        - name: tmp-workspace
          emptyDir:
            sizeLimit: 1Gi  # Limit workspace size
---
apiVersion: v1
kind: Service
metadata:
  name: green-agent
  namespace: mainframe-modernization
  labels:
    app: green-agent
spec:
  selector:
    app: green-agent
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
# Purple Agent - AI Modernizer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: purple-agent
  namespace: mainframe-modernization
  labels:
    app: purple-agent
    component: ai-modernizer
    version: "1.0.0"
spec:
  replicas: 2  # Can scale horizontally for parallel translation jobs
  selector:
    matchLabels:
      app: purple-agent
  template:
    metadata:
      labels:
        app: purple-agent
        component: ai-modernizer
    spec:
      serviceAccountName: purple-agent-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      initContainers:
        - name: wait-for-gateway
          image: busybox:1.36
          command: ['sh', '-c', 'until wget -qO- http://agent-gateway:8090/health; do echo "Waiting for agent-gateway..."; sleep 3; done']
      containers:
        - name: purple-agent
          image: venkatnagala/purple-agent:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
              name: http
          env:
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: log-level
            - name: AGENT_GATEWAY_URL
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: gateway-url
            - name: AGENT_ID
              value: "purple_agent"
            - name: AGENT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: purple-agent-credentials
                  key: api-key
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: purple-agent-credentials
                  key: gemini-api-key
            - name: GEMINI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: pipeline-config
                  key: gemini-model
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp-workspace
              mountPath: /tmp/workspace
      volumes:
        - name: tmp-workspace
          emptyDir:
            sizeLimit: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: purple-agent
  namespace: mainframe-modernization
  labels:
    app: purple-agent
spec:
  selector:
    app: purple-agent
  ports:
    - name: http
      port: 8085
      targetPort: 8085
  type: ClusterIP
---
# Horizontal Pod Autoscaler for Purple Agent
# Scales up when there are many COBOL files to translate
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: purple-agent-hpa
  namespace: mainframe-modernization
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: purple-agent
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
