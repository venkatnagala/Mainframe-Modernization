---
# Agent Gateway JWT Secret
# In production: use Sealed Secrets or AWS Secrets Manager CSI driver
# Generate: kubectl create secret generic gateway-jwt-secret \
#   --from-literal=jwt-secret=$(openssl rand -base64 48) \
#   -n mainframe-modernization
apiVersion: v1
kind: Secret
metadata:
  name: gateway-jwt-secret
  namespace: mainframe-modernization
  labels:
    app: agent-gateway
type: Opaque
stringData:
  # REPLACE with actual secrets - never commit real values!
  jwt-secret: "CHANGE_ME_USE_KUBECTL_OR_SEALED_SECRETS"
---
# Green Agent credentials
apiVersion: v1
kind: Secret
metadata:
  name: green-agent-credentials
  namespace: mainframe-modernization
  labels:
    app: green-agent
type: Opaque
stringData:
  api-key: "CHANGE_ME_GREEN_AGENT_KEY"
  # AWS credentials injected via IRSA (preferred) or here for local dev
  aws-access-key-id: "CHANGE_ME"
  aws-secret-access-key: "CHANGE_ME"
  aws-region: "us-east-1"
---
# Purple Agent credentials
apiVersion: v1
kind: Secret
metadata:
  name: purple-agent-credentials
  namespace: mainframe-modernization
  labels:
    app: purple-agent
type: Opaque
stringData:
  api-key: "CHANGE_ME_PURPLE_AGENT_KEY"
  gemini-api-key: "CHANGE_ME_GEMINI_KEY"
---
# S3 Bucket config (non-sensitive)
apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-config
  namespace: mainframe-modernization
data:
  s3-bucket: "mainframe-refactor-lab-venkatnagala"
  aws-region: "us-east-1"
  gemini-model: "gemini-2.5-pro"
  gateway-url: "http://agent-gateway:8090"
  log-level: "info"
