services:

  # 🔐 Agent Gateway - JWT AuthN + RBAC AuthZ for all MCP calls
  agent-gateway:
    build:
      context: ./agent_gateway
      dockerfile: Dockerfile
    container_name: agent-gateway
    ports:
      - "8090:8090"
    env_file: .env
    environment:
      - BIND_ADDR=0.0.0.0:8090
      - RUST_LOG=info
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production-minimum-32-chars}
      - GREEN_AGENT_API_KEY=${AGENT_API_KEY:-green-agent-dev-key-change-in-prod}
      - PURPLE_AGENT_API_KEY=purple-agent-dev-key-change-in-prod
      - S3_MCP_URL=http://s3-mcp:8081
      - GEMINI_MCP_URL=http://gemini-mcp:8082
      - COBOL_MCP_URL=http://cobol-mcp:8083
      - RUST_MCP_URL=http://rust-mcp:8084
    networks:
      - modernization-network
    restart: always

  # 🪣 S3 MCP - AWS S3 operations
  s3-mcp:
    build:
      context: ./s3_mcp
      dockerfile: Dockerfile
    container_name: s3-mcp
    ports:
      - "8086:8081"
    env_file: .env
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=us-east-1
      - BIND_ADDR=0.0.0.0:8081
      - RUST_LOG=info
    depends_on:
      - agent-gateway
    networks:
      - modernization-network
    restart: always

  # 🧠 Gemini MCP - AI translation via Gemini 2.5 Pro
  gemini-mcp:
    build:
      context: ./gemini_mcp
      dockerfile: Dockerfile
    container_name: gemini-mcp
    ports:
      - "8087:8082"
    env_file: .env
    environment:      
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - BIND_ADDR=0.0.0.0:8082
      - RUST_LOG=info
    depends_on:
      - agent-gateway
    networks:
      - modernization-network
    restart: always

  # ⚙️ COBOL MCP - GnuCOBOL compilation and execution
  cobol-mcp:
    build:
      context: ./cobol_mcp
      dockerfile: Dockerfile
    container_name: cobol-mcp
    ports:
      - "8088:8083"
    environment:
      - BIND_ADDR=0.0.0.0:8083
      - RUST_LOG=info
    depends_on:
      - agent-gateway
    networks:
      - modernization-network
    restart: always

  # 🦀 Rust MCP - Cargo compilation and execution
  rust-mcp:
    build:
      context: ./rust_mcp
      dockerfile: Dockerfile
    container_name: rust-mcp
    ports:
      - "8089:8084"
    environment:
      - BIND_ADDR=0.0.0.0:8084
      - RUST_LOG=info
    depends_on:
      - agent-gateway
    networks:
      - modernization-network
    restart: always

  # 🟣 Purple Agent - AI Modernizer
  purple-agent:
    build:
      context: ./purple_agent
      dockerfile: Dockerfile
    container_name: purple-agent
    ports:
      - "8085:8081"
    env_file: .env
    depends_on:
      - agent-gateway
      - gemini-mcp
    networks:
      - modernization-network
    restart: always

  # 🟢 Green Agent - Orchestrator
  green-agent:
    build:
      context: ./green_agent
      dockerfile: Dockerfile
    container_name: green-agent
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=us-east-1            
      - PURPLE_AGENT_URL=http://purple-agent:8081/solve
      - AGENT_GATEWAY_URL=http://agent-gateway:8090
      - AGENT_ID=green_agent
      - AGENT_API_KEY=${AGENT_API_KEY:-green-agent-dev-key-change-in-prod}
    depends_on:
      - agent-gateway
      - s3-mcp
      - gemini-mcp
      - cobol-mcp
      - rust-mcp
      - purple-agent
    networks:
      - modernization-network
    restart: always

networks:
  modernization-network:
    driver: bridge
